<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --card2: #2c2c2e;
            --card3: #3a3a3c;
            --sep: #38383a;
            --text: #ffffff;
            --text2: #8e8e93;
            --text3: #636366;
            --blue: #0a84ff;
            --orange: #ff9f0a;
            --red: #ff453a;
            --green: #30d158;
            --teal: #64d2ff;
            --purple: #bf5af2;
            --pink: #ff375f;
            --yellow: #ffd60a;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden;
            position: fixed; top:0; left:0; user-select: none;
            -webkit-user-select: none;
        }

        /* ===== شاشة الرفع ===== */
        .upload-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
            background: var(--bg); gap: 18px;
        }
        .upload-screen.hidden { display: none; }
        .upload-icon {
            width: 96px; height: 96px; border-radius: 26px; background: var(--card);
            display: flex; align-items: center; justify-content: center; color: var(--blue);
        }
        .upload-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
        .upload-sub { font-size: 15px; color: var(--text2); text-align: center; line-height: 1.5; }
        .upload-btn {
            margin-top: 8px; padding: 14px 44px; border-radius: 14px;
            background: var(--blue); color: #fff; font-size: 17px; font-weight: 600;
            border: none; font-family: inherit; cursor: pointer;
            transition: transform 0.12s, opacity 0.12s;
        }
        .upload-btn:active { transform: scale(0.96); opacity: 0.8; }
        .upload-hint { font-size: 12px; color: var(--text3); }

        /* سحب وإفلات */
        .drop-overlay {
            position: fixed; inset: 0; z-index: 499; display: none;
            align-items: center; justify-content: center;
            background: rgba(10,132,255,0.12); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .drop-overlay.show { display: flex; }
        .drop-overlay span { font-size: 20px; font-weight: 600; color: var(--blue); }

        /* ===== شريط علوي ===== */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: env(safe-area-inset-top, 48px); min-height: 48px;
            padding-top: env(safe-area-inset-top, 0px);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 16px; padding-right: 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 70%, transparent 100%);
            z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .topbar.show { opacity: 1; pointer-events: auto; }
        .topbar button {
            font-size: 17px; background: none; border: none;
            font-family: inherit; cursor: pointer; padding: 8px 4px;
        }
        .btn-cancel { color: var(--text); opacity: 0.85; }
        .btn-done { color: var(--blue); font-weight: 600; }
        .top-title { font-size: 17px; font-weight: 600; }

        /* ===== منطقة الصورة ===== */
        .image-area {
            position: fixed; inset: 0; display: flex;
            align-items: center; justify-content: center; z-index: 1;
        }
        #mainCanvas { max-width: 100%; max-height: 100%; display: block; }

        /* نصيحة قبل/بعد */
        .compare-badge {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.65);
            -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
            padding: 10px 24px; border-radius: 20px;
            font-size: 15px; font-weight: 600; z-index: 90;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .compare-badge.show { opacity: 1; }

        /* ===== شريط التبويبات السفلي (شكل بيضاوي زي آيفون) ===== */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .bottom-bar.show { opacity: 1; pointer-events: auto; }
        .tabs-pill {
            display: flex; justify-content: center; align-items: center; gap: 4px;
            margin: 0 40px 8px;
            padding: 6px 8px;
            background: rgba(44,44,46,0.92);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border-radius: 36px;
            border: 0.5px solid rgba(255,255,255,0.08);
        }
        .tab-btn {
            display: flex; align-items: center; gap: 5px;
            background: none; border: none; color: var(--text2);
            font-family: inherit; font-size: 13px; font-weight: 500;
            cursor: pointer; padding: 7px 16px; border-radius: 28px;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap; position: relative;
        }
        .tab-btn.active {
            color: #000; font-weight: 600;
            background: var(--yellow);
        }
        .tab-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

        /* ===== لوحة الأدوات (تطلع من تحت) ===== */
        .tool-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            z-index: 150; transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
            max-height: 58vh; overflow: hidden; display: flex; flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .tool-panel.open { transform: translateY(0); }
        .panel-handle {
            width: 36px; height: 5px; border-radius: 3px;
            background: var(--sep); margin: 8px auto 0; flex-shrink: 0;
            cursor: grab;
        }
        .panel-body {
            flex: 1; overflow-y: auto; padding: 10px 0 24px;
            -webkit-overflow-scrolling: touch;
        }
        .panel-body::-webkit-scrollbar { display: none; }

        /* ===== أدوات التعديل الدائرية (بالظبط زي الصور) ===== */
        .edit-scroll {
            display: flex; overflow-x: auto; gap: 14px;
            padding: 10px 18px 8px; scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .edit-scroll::-webkit-scrollbar { display: none; }

        .edit-circle {
            flex: 0 0 64px; display: flex; flex-direction: column;
            align-items: center; gap: 7px; background: none;
            border: none; cursor: pointer; outline: none; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .circle-bg {
            width: 52px; height: 52px; border-radius: 50%;
            background: #111111;
            border: 2px solid transparent;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            position: relative; overflow: hidden;
        }
        /* الإضاءة الداخلية للدائرة (زي آيفون بالظبط) */
        .circle-bg::before {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            opacity: 0.6;
        }
        .circle-bg svg {
            width: 24px; height: 24px; fill: none;
            stroke: #fff; stroke-width: 1.5;
            stroke-linecap: round; stroke-linejoin: round;
            position: relative; z-index: 1;
        }

        /* الحالة النشطة - إطار أصفر */
        .edit-circle.active .circle-bg {
            border-color: var(--yellow);
            background: #0a0a0a;
            box-shadow: 0 0 10px rgba(255,214,10,0.15);
        }
        /* حلقة خارجية صفراء لما في تعديل */
        .edit-circle.modified .circle-bg {
            border-color: var(--yellow);
        }
        .edit-circle.modified .circle-bg::after {
            content: ''; position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1.5px solid var(--yellow); border-radius: 50%;
        }

        .edit-circle span {
            font-size: 10px; color: var(--text2);
            font-weight: 400; white-space: nowrap;
            transition: color 0.2s;
        }
        .edit-circle.active span { color: var(--yellow); font-weight: 600; }

        /* ألوان إضاءة كل دائرة */
        .clr-auto .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,159,10,0.35), transparent 70%); }
        .clr-exposure .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(10,132,255,0.35), transparent 70%); }
        .clr-brilliance .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(100,210,255,0.35), transparent 70%); }
        .clr-highlights .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,214,10,0.35), transparent 70%); }
        .clr-shadows .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(191,90,242,0.35), transparent 70%); }
        .clr-contrast .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,55,95,0.35), transparent 70%); }
        .clr-brightness .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,159,10,0.35), transparent 70%); }
        .clr-blackpoint .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(142,142,147,0.3), transparent 70%); }
        .clr-saturation .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(48,209,88,0.35), transparent 70%); }
        .clr-vibrance .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,55,95,0.35), transparent 70%); }
        .clr-warmth .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,159,10,0.35), transparent 70%); }
        .clr-tint .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(100,210,255,0.35), transparent 70%); }
        .clr-sharpness .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(10,132,255,0.35), transparent 70%); }
        .clr-definition .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(191,90,242,0.35), transparent 70%); }
        .clr-noise .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(142,142,147,0.3), transparent 70%); }
        .clr-vignette .circle-bg::before { background: radial-gradient(circle at 40% 35%, rgba(255,55,95,0.35), transparent 70%); }

        /* ===== السلايدر (بالظبط زي آيفون) ===== */
        .slider-area { padding: 8px 22px 0; display: none; }
        .slider-area.show { display: block; }
        .slider-head {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }
        .slider-head-title { font-size: 14px; font-weight: 600; }
        .slider-reset-btn {
            font-size: 14px; color: var(--blue); background: none;
            border: none; font-family: inherit; cursor: pointer;
        }
        .slider-track-wrap {
            position: relative; width: 100%; height: 28px;
            display: flex; align-items: center;
        }
        .slider-track-bg {
            position: absolute; left: 0; right: 0; height: 2px;
            border-radius: 1px; background: var(--card3); overflow: visible;
        }
        .slider-track-fill {
            position: absolute; top: 0; height: 100%; border-radius: 1px;
            background: var(--yellow); width: 50%;
            transition: width 0.04s;
        }
        .slider-track-fill.neg { background: var(--yellow); }
        input[type=range].ios-slider {
            -webkit-appearance: none; appearance: none;
            position: relative; width: 100%; height: 28px;
            background: transparent; z-index: 2; cursor: pointer;
        }
        input[type=range].ios-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(0,0,0,0.15);
        }
        input[type=range].ios-slider::-moz-range-thumb {
            width: 28px; height: 28px; border-radius: 50%; border: none;
            background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .slider-labels {
            display: flex; justify-content: space-between; margin-top: 0;
        }
        .slider-labels span { font-size: 11px; color: var(--text3); }
        .slider-val-display { font-weight: 700; color: var(--yellow) !important; }

        /* ===== لوحة الفلاتر ===== */
        .filters-scroll {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 10px 16px 16px; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .filters-scroll::-webkit-scrollbar { display: none; }
        .filter-item {
            flex-shrink: 0; width: 82px; display: flex;
            flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; scroll-snap-align: start;
        }
        .filter-thumb {
            width: 82px; height: 82px; border-radius: 50%;
            overflow: hidden; border: 2.5px solid transparent;
            transition: border-color 0.2s;
        }
        .filter-item.active .filter-thumb { border-color: var(--yellow); }
        .filter-thumb canvas { width: 100%; height: 100%; display: block; }
        .filter-item span {
            font-size: 10px; color: var(--text2); transition: color 0.2s;
        }
        .filter-item.active span { color: var(--yellow); font-weight: 600; }

        /* ===== لوحة القص ===== */
        .crop-ratios {
            display: flex; gap: 8px; flex-wrap: wrap;
            padding: 4px 18px; margin-bottom: 14px; justify-content: center;
        }
        .crop-r-btn {
            padding: 7px 16px; border-radius: 20px;
            background: var(--card2); border: none; color: var(--text);
            font-family: inherit; font-size: 13px; cursor: pointer;
            transition: all 0.2s;
        }
        .crop-r-btn.active { background: var(--yellow); color: #000; font-weight: 600; }
        .crop-hint {
            text-align: center; color: var(--text2);
            font-size: 14px; line-height: 1.6; padding: 0 20px;
        }
        .crop-actions {
            display: flex; justify-content: center; gap: 10px;
            margin-top: 18px; padding: 0 20px;
        }
        .crop-act-btn {
            padding: 11px 26px; border-radius: 12px; border: none;
            font-family: inherit; font-size: 15px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 7px;
            transition: transform 0.12s;
        }
        .crop-act-btn:active { transform: scale(0.96); }
        .crop-act-btn.primary { background: var(--yellow); color: #000; }
        .crop-act-btn.secondary { background: var(--card2); color: var(--text); }

        /* ===== لوحة التدوير ===== */
        .rotate-btns {
            display: flex; justify-content: center; gap: 28px; padding: 14px 0;
        }
        .rot-btn {
            width: 64px; height: 64px; border-radius: 50%;
            background: var(--card2); border: none; color: var(--text);
            font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.12s, background 0.15s;
        }
        .rot-btn:active { transform: scale(0.9); background: var(--sep); }
        .rotate-slider-area { padding: 6px 22px 0; }
        .flip-row {
            display: flex; justify-content: center; gap: 14px; padding: 18px 16px 0;
        }
        .flip-btn {
            padding: 10px 20px; border-radius: 12px;
            background: var(--card2); border: none; color: var(--text);
            font-family: inherit; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 7px;
            transition: transform 0.12s;
        }
        .flip-btn:active { transform: scale(0.96); }

        /* ===== لوحة التلقائي ===== */
        .auto-content {
            text-align: center; padding: 28px 20px;
            color: var(--text2); font-size: 15px; line-height: 1.7;
        }
        .auto-magic-btn {
            margin-top: 18px; padding: 13px 38px; border-radius: 50px;
            background: linear-gradient(135deg, var(--orange), var(--pink));
            color: #fff; font-size: 17px; font-weight: 600;
            border: none; font-family: inherit; cursor: pointer;
            transition: transform 0.12s;
        }
        .auto-magic-btn:active { transform: scale(0.95); }

        /* ===== إشعار ===== */
        .toast {
            position: fixed; top: 56px; left: 50%;
            transform: translateX(-50%) translateY(-24px);
            background: rgba(28,28,30,0.92);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border: 0.5px solid var(--sep);
            padding: 11px 22px; border-radius: 14px;
            font-size: 15px; font-weight: 500; z-index: 999;
            opacity: 0; transition: all 0.3s cubic-bezier(0.32,0.72,0,1);
            pointer-events: none; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* طبقة القص */
        .crop-overlay-canvas {
            position: fixed; inset: 0; z-index: 80; display: none; cursor: crosshair;
        }
        .crop-overlay-canvas.show { display: block; }

        @media(min-width:768px) {
            .tool-panel {
                max-width: 480px; left: 50%;
                transform: translate(-50%, 100%);
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
            }
            .tool-panel.open { transform: translate(-50%, 0); }
        }
        @media(prefers-reduced-motion:reduce) {
            *{ transition-duration:0.01ms!important; animation-duration:0.01ms!important; }
        }
    </style>
</head>
<body>

<!-- شاشة الرفع -->
<div class="upload-screen" id="uploadScreen">
    <div class="upload-icon">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
    </div>
    <div class="upload-title">الصور</div>
    <div class="upload-sub">اختار صورة من جهازك<br>لتعديلها بأدوات احترافية</div>
    <button class="upload-btn" id="uploadBtn">اختر صورة</button>
    <div class="upload-hint">اسحب وأفلت أو اضغط للاختيار</div>
    <input type="file" id="fileInput" accept="image/*" hidden>
</div>

<!-- سحب وإفلات -->
<div class="drop-overlay" id="dropOverlay"><span>أسقط الصورة هنا</span></div>

<!-- شريط علوي -->
<div class="topbar" id="topbar">
    <button class="btn-cancel" id="btnCancel">إلغاء</button>
    <span class="top-title" id="topTitle">تعديل</span>
    <button class="btn-done" id="btnDone">تم</button>
</div>

<!-- منطقة الصورة -->
<div class="image-area"><canvas id="mainCanvas"></canvas></div>

<!-- نصيحة المقارنة -->
<div class="compare-badge" id="compareBadge">الأصل</div>

<!-- طبقة القص -->
<canvas class="crop-overlay-canvas" id="cropOverlayCanvas"></canvas>

<!-- شريط التبويبات السفلي (شكل حبوب آيفون) -->
<div class="bottom-bar" id="bottomBar">
    <div class="tabs-pill">
        <button class="tab-btn" data-tab="auto">
            <svg viewBox="0 0 24 24"><path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/></svg>
            <span>تلقائي</span>
        </button>
        <button class="tab-btn" data-tab="adjust">
            <svg viewBox="0 0 24 24"><path d="M3 17V19H9V17H3ZM3 5V7H13V5H3ZM13 21V19H21V17H13V15H11V21H13ZM7 9V11H3V13H7V15H9V9H7ZM21 13V11H11V13H21ZM15 9H17V7H21V5H17V3H15V9Z"/></svg>
            <span>Adjust</span>
        </button>
        <button class="tab-btn" data-tab="filters">
            <svg viewBox="0 0 24 24"><path d="M3 5H7L9 3H15L17 5H21V7H3V5ZM5 8H19V20C19 20.55 18.55 21 18 21H6C5.45 21 5 20.55 5 20V8ZM8 10V19H10V10H8ZM14 10V19H16V10H14Z"/></svg>
            <span>Filters</span>
        </button>
        <button class="tab-btn" data-tab="crop">
            <svg viewBox="0 0 24 24"><path d="M17 15H7V7H9V13H15V7H17V15ZM5 3H19C20.1 3 21 3.9 21 5V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3ZM5 5V19H19V5H5Z"/></svg>
            <span>Crop</span>
        </button>
        <button class="tab-btn" data-tab="rotate">
            <svg viewBox="0 0 24 24"><path d="M7.11 8.53L5.7 7.11C4.8 8.27 4.24 9.61 4.07 11H2.05C2.25 9.14 2.99 7.44 4.17 6.05L2.71 4.59L4.13 3.17L7.11 6.15V8.53ZM21.95 13H19.93C19.76 14.39 19.2 15.73 18.3 16.89L16.89 15.47V18.85L19.87 21.83L21.29 20.41L19.83 18.95C21.01 17.56 21.75 15.86 21.95 13ZM16 5H18V11H16V5ZM8 13H14V15H8V13Z"/></svg>
            <span>تدوير</span>
        </button>
    </div>
</div>

<!-- لوحة التلقائي -->
<div class="tool-panel" id="panelAuto">
    <div class="panel-handle"></div>
    <div class="panel-body">
        <div class="auto-content">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="var(--orange)" style="margin-bottom:10px;opacity:0.65;"><path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/></svg>
            <p>تحسين تلقائي للصورة<br>يضبط الإضاءة والألوان والتباين</p>
            <button class="auto-magic-btn" id="autoBtn">تحسين تلقائي</button>
        </div>
    </div>
</div>

<!-- لوحة التعديل -->
<div class="tool-panel" id="panelAdjust">
    <div class="panel-handle"></div>
    <div class="panel-body">

<!-- إشعار -->
<div class="toast" id="toast"></div>

<script>
// ===== المتغيرات =====
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const cropOv = document.getElementById('cropOverlayCanvas');
const cropOvCtx = cropOv.getContext('2d');
const fileInput = document.getElementById('fileInput');

let originalImage = null;
let workingImage = null;
let currentFilter = 'none';
let flipH = false, flipV = false;
let freeRotation = 0;
let cropRatio = 'free';
let isCropping = false;
let cropStart = null, cropEnd = null;
let activeTool = null;
let activePanel = null;
let isComparing = false;

// حالة التعديلات
let adj = {
    auto:0, exposure:0, brilliance:0, highlights:0, shadows:0,
    contrast:0, brightness:0, blackpoint:0, saturation:0,
    vibrance:0, warmth:0, tint:0, sharpness:0,
    definition:0, noise:0, vignette:0
};

// تعريفات الأدوات بالظبط زي الصور
const tools = [
    { id:'auto', label:'تلقائي', cls:'clr-auto',
      icon:'<path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/>' },
    { id:'exposure', label:'التعرض', cls:'clr-exposure', min:-100, max:100,
      icon:'<circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/>' },
    { id:'brilliance', label:'البهاء', cls:'clr-brilliance', min:-100, max:100,
      icon:'<polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>' },
    { id:'highlights', label:'الإضاءة', cls:'clr-highlights', min:-100, max:100,
      icon:'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>' },
    { id:'shadows', label:'الظلال', cls:'clr-shadows', min:-100, max:100,
      icon:'<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9z" opacity="0.4"/><path d="M12 3v18"/>' },
    { id:'contrast', label:'التباين', cls:'clr-contrast', min:-100, max:100,
      icon:'<path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2v20z"/>' },
    { id:'brightness', label:'السطوع', cls:'clr-brightness', min:-100, max:100,
      icon:'<circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/>' },
    { id:'blackpoint', label:'السوداء', cls:'clr-blackpoint', min:-100, max:100,
      icon:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3.5" fill="#fff"/>' },
    { id:'saturation', label:'التشبع', cls:'clr-saturation', min:-100, max:100,
      icon:'<path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 6a6 6 0 0 1 0 12 6 6 0 0 1 0-12z" fill="rgba(255,255,255,0.25)"/>' },
    { id:'vibrance', label:'الحيوية', cls:'clr-vibrance', min:-100, max:100,
      icon:'<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" opacity="0.25"/><path d="M12 2a10 10 0 0 1 0 20" fill="rgba(255,100,100,0.35)"/><path d="M12 2a10 10 0 0 0 0 20" fill="rgba(100,200,255,0.25)"/>' },
    { id:'warmth', label:'الدفء', cls:'clr-warmth', min:-100, max:100,
      icon:'<path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z" fill="none"/><path d="M12 2a5 5 0 0 1 0 20" fill="rgba(255,159,10,0.35)"/>' },
    { id:'tint', label:'الصبغة', cls:'clr-tint', min:-100, max:100,
      icon:'<circle cx="12" cy="12" r="10" fill="none"/><path d="M12 2C6.48 2 2 6.48 2 12" stroke="rgba(100,210,255,0.5)" stroke-width="3" fill="none"/>' },
    { id:'sharpness', label:'الوضوح', cls:'clr-sharpness', min:0, max:100,
      icon:'<path d="M12 2l2.09 6.26L20.18 9.27l-5 4.87L16.36 21 12 17.77 7.64 21l1.18-6.86-5-4.87 6.09-1.01L12 2z"/>' },
    { id:'definition', label:'التحديد', cls:'clr-definition', min:-100, max:100,
      icon:'<circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" opacity="0.4"/><circle cx="12" cy="12" r="10" opacity="0.2"/>' },
    { id:'noise', label:'التشويش', cls:'clr-noise', min:0, max:100,
      icon:'<circle cx="12" cy="12" r="10" fill="none"/><circle cx="8" cy="8" r="0.8" fill="#fff"/><circle cx="15" cy="10" r="0.8" fill="#fff"/><circle cx="10" cy="15" r="0.8" fill="#fff"/><circle cx="16" cy="16" r="0.8" fill="#fff"/><circle cx="13" cy="6" r="0.8" fill="#fff"/><circle cx="7" cy="14" r="0.8" fill="#fff"/>' },
    { id:'vignette', label:'الحواف', cls:'clr-vignette', min:-100, max:100,
      icon:'<rect x="2" y="2" width="20" height="20" rx="3" fill="none"/><circle cx="12" cy="12" r="6" fill="none"/>' }
];

// الفلاتر
const filters = [
    { id:'none', label:'الأصلي', css:'' },
    { id:'vivid', label:'حيوي', css:'saturate(160%) contrast(110%)' },
    { id:'vividWarm', label:'حيوي دافئ', css:'saturate(150%) contrast(105%) sepia(15%)' },
    { id:'vividCool', label:'حيوي بارد', css:'saturate(140%) contrast(105%) hue-rotate(15deg)' },
    { id:'dramatic', label:'درامي', css:'contrast(140%) brightness(90%) saturate(80%)' },
    { id:'dramaticWarm', label:'درامي دافئ', css:'contrast(135%) brightness(92%) sepia(20%)' },
    { id:'dramaticCool', label:'درامي بارد', css:'contrast(135%) brightness(90%) hue-rotate(20deg) saturate(80%)' },
    { id:'mono', label:'أبيض وأسود', css:'grayscale(100%)' },
    { id:'silver', label:'فضي', css:'grayscale(80%) contrast(120%) brightness(110%)' },
    { id:'noir', label:'نوار', css:'grayscale(100%) contrast(150%) brightness(85%)' },
    { id:'fade', label:'باهت', css:'brightness(115%) contrast(85%) saturate(70%)' },
    { id:'chrome', label:'كروم', css:'contrast(115%) saturate(90%) brightness(105%)' },
    { id:'process', label:'معالجة', css:'contrast(120%) brightness(95%) saturate(70%) sepia(10%)' },
    { id:'instant', label:'فوري', css:'contrast(110%) brightness(105%) saturate(85%) sepia(8%)' },
    { id:'tonal', label:'درجي', css:'contrast(105%) brightness(105%) saturate(110%)' },
    { id:'transfer', label:'نقل', css:'contrast(115%) brightness(95%) saturate(75%) sepia(15%)' },
    { id:'monoWarm', label:'أحادي دافئ', css:'grayscale(90%) sepia(20%) contrast(110%)' },
    { id:'monoCool', label:'أحادي بارد', css:'grayscale(90%) hue-rotate(180deg) contrast(110%)' },
];

// ===== الإشعار =====
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tm);
    t._tm = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== بناء فلتر CSS من التعديلات =====
function buildAdjustCSS() {
    const a = adj;
    let brightness = 100 + (a.brightness * 0.5) + (a.exposure * 0.5) + (a.brilliance * 0.2) + (a.highlights * 0.15) - (a.shadows * 0.1);
    let contrast = 100 + (a.contrast * 0.4) + (a.definition * 0.2) + (a.brilliance * 0.15);
    let saturate = 100 + (a.saturation * 0.8) + (a.vibrance * 0.4) + (a.brilliance * 0.2);
    brightness = Math.max(0, Math.min(250, brightness));
    contrast = Math.max(0, Math.min(250, contrast));
    saturate = Math.max(0, Math.min(300, saturate));
    let hueShift = a.warmth * 0.15 + a.tint * 0.1;
    let f = 'brightness(' + brightness + '%) contrast(' + contrast + '%) saturate(' + saturate + '%)';
    if (Math.abs(hueShift) > 0.5) f += ' hue-rotate(' + hueShift + 'deg)';
    return f;
}

function getFullFilter() {
    const fObj = filters.find(function(f){ return f.id === currentFilter; });
    const adjF = buildAdjustCSS();
    if (!fObj || !fObj.css) return adjF;
    return fObj.css + ' ' + adjF;
}

// ===== رسم الصورة =====
function renderImage(useOriginal) {
    const img = workingImage || originalImage;
    if (!img) return;

    const rot = freeRotation * Math.PI / 180;
    const absC = Math.abs(Math.cos(rot));
    const absS = Math.abs(Math.sin(rot));
    let w = Math.ceil(img.width * absC + img.height * absS);
    let h = Math.ceil(img.width * absS + img.height * absC);

    canvas.width = w;
    canvas.height = h;
    ctx.clearRect(0, 0, w, h);
    ctx.save();

    if (!useOriginal) ctx.filter = getFullFilter();

    ctx.translate(w / 2, h / 2);
    ctx.rotate(rot);
    ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    ctx.drawImage(img, -img.width / 2, -img.height / 2);
    ctx.restore();

    // فينيت
    if (!useOriginal && adj.vignette !== 0) {
        const str = Math.abs(adj.vignette) / 100;
        const grad = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.3, w/2, h/2, Math.max(w,h)*0.7);
        if (adj.vignette < 0) {
            grad.addColorStop(0, 'rgba(255,255,255,' + (str * 0.5) + ')');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
        } else {
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,' + (str * 0.7) + ')');
        }
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
    }
}

// ===== رفع الصورة =====
function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) { showToast('اختر ملف صورة صالح'); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            originalImage = img;
            workingImage = img;
            document.getElementById('uploadScreen').classList.add('hidden');
            document.getElementById('topbar').classList.add('show');
            document.getElementById('bottomBar').classList.add('show');
            resetAll(false);
            renderImage();
            showToast('تم تحميل الصورة');
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById('uploadBtn').addEventListener('click', function() { fileInput.click(); });
fileInput.addEventListener('change', function(e) { if (e.target.files[0]) loadImage(e.target.files[0]); });

// سحب وإفلات
var dragC = 0;
var dropOv = document.getElementById('dropOverlay');
document.addEventListener('dragenter', function(e) { e.preventDefault(); dragC++; dropOv.classList.add('show'); });
document.addEventListener('dragleave', function(e) { e.preventDefault(); dragC--; if(dragC<=0){dragC=0;dropOv.classList.remove('show');} });
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
    e.preventDefault(); dragC=0; dropOv.classList.remove('show');
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

// ===== إعادة تعيين =====
function resetAll(showMsg) {
    currentFilter = 'none';
    flipH = false; flipV = false;
    freeRotation = 0;
    isCropping = false; cropStart = null; cropEnd = null;
    activeTool = null;
    var keys = Object.keys(adj);
    for (var i = 0; i < keys.length; i++) adj[keys[i]] = 0;
    workingImage = originalImage;
    document.getElementById('rotSlider').value = 0;
    document.getElementById('rotFill').style.width = '50%';
    document.getElementById('rotFill').classList.remove('neg');
    document.getElementById('rotVal').textContent = '0°';
    cropOv.classList.remove('show');
    updateModified();
    renderImage();
    if (showMsg) showToast('تم إعادة التعيين');
}

// ===== التبويبات =====
var panelMap = {
    auto: document.getElementById('panelAuto'),
    adjust: document.getElementById('panelAdjust'),
    filters: document.getElementById('panelFilters'),
    crop: document.getElementById('panelCrop'),
    rotate: document.getElementById('panelRotate')
};

var tabBtns = document.querySelectorAll('.tab-btn');
for (var ti = 0; ti < tabBtns.length; ti++) {
    (function(tab) {
        tab.addEventListener('click', function() {
            if (!originalImage) return;
            var name = tab.dataset.tab;
            var allTabs = document.querySelectorAll('.tab-btn');
            for (var j = 0; j < allTabs.length; j++) allTabs[j].classList.remove('active');
            tab.classList.add('active');

            // إغلاق كل اللوحات
            var pKeys = Object.keys(panelMap);
            for (var k = 0; k < pKeys.length; k++) panelMap[pKeys[k]].classList.remove('open');

            if (name !== 'crop') {
                isCropping = false; cropStart = null; cropEnd = null;
                cropOv.classList.remove('show'); renderImage();
            }

            panelMap[name].classList.add('open');
            activePanel = name;

            if (name === 'filters') buildFilterThumbs();
            if (name === 'adjust') buildEditCircles();
        });
    })(tabBtns[ti]);
}

// ===== بناء الأدوات الدائرية =====
function buildEditCircles() {
    var row = document.getElementById('editScroll');
    row.innerHTML = '';
    for (var i = 0; i < tools.length; i++) {
        (function(tool) {
            var btn = document.createElement('button');
            btn.className = 'edit-circle ' + tool.cls + (adj[tool.id] !== 0 ? ' modified' : '');
            btn.id = 'ec-' + tool.id;
            btn.innerHTML = '<div class="circle-bg"><svg viewBox="0 0 24 24">' + tool.icon + '</svg></div><span>' + tool.label + '</span>';
            btn.addEventListener('click', function() {
                var allC = document.querySelectorAll('.edit-circle');
                for (var j = 0; j < allC.length; j++) allC[j].classList.remove('active');
                btn.classList.add('active');
                activeTool = tool.id;
                if (tool.id === 'auto') {
                    applyAutoEnhance();
                } else {
                    showSlider(tool);
                }
            });
            row.appendChild(btn);
        })(tools[i]);
    }
}

function updateModified() {
    for (var i = 0; i < tools.length; i++) {
        var el = document.getElementById('ec-' + tools[i].id);
        if (el) {
            if (adj[tools[i].id] !== 0) el.classList.add('modified');
            else el.classList.remove('modified');
        }
    }
}

// ===== السلايدر =====
function showSlider(tool) {
    var area = document.getElementById('sliderArea');
    var val = adj[tool.id] || 0;
    var min = tool.min !== undefined ? tool.min : -100;
    var max = tool.max !== undefined ? tool.max : 100;
    var pct = ((val - min) / (max - min)) * 100;

    area.innerHTML =
        '<div class="slider-head">' +
            '<span class="slider-head-title">' + tool.label + '</span>' +
            '<button class="slider-reset-btn" id="sReset">إعادة تعيين</button>' +
        '</div>' +
        '<div class="slider-track-wrap">' +
            '<div class="slider-track-bg"><div class="slider-track-fill" id="sFill" style="width:' + pct + '%"></div></div>' +
            '<input type="range" class="ios-slider" id="sSlider" min="' + min + '" max="' + max + '" value="' + val + '" step="1">' +
        '</div>' +
        '<div class="slider-labels">' +
            '<span>' + min + '</span>' +
            '<span id="sVal" class="slider-val-display">' + val + '</span>' +
            '<span>' + max + '</span>' +
        '</div>';
    area.classList.add('show');

    var slider = document.getElementById('sSlider');
    var fill = document.getElementById('sFill');
    var valDisp = document.getElementById('sVal');

    slider.addEventListener('input', function() {
        var v = parseInt(slider.value);
        adj[tool.id] = v;
        var p = ((v - min) / (max - min)) * 100;
        fill.style.width = p + '%';
        valDisp.textContent = v;
        updateModified();
        renderImage();
    });

    document.getElementById('sReset').addEventListener('click', function() {
        adj[tool.id] = 0;
        slider.value = 0;
        var p = ((0 - min) / (max - min)) * 100;
        fill.style.width = p + '%';
        valDisp.textContent = '0';
        updateModified();
        renderImage();
    });
}

// ===== التحسين التلقائي =====
function applyAutoEnhance() {
    adj.exposure = 10; adj.brilliance = 15; adj.highlights = -10;
    adj.shadows = 20; adj.contrast = 10; adj.saturation = 10;
    adj.vibrance = 15; adj.warmth = 5;
    updateModified();
    renderImage();
    showToast('تم التحسين التلقائي');
    if (activeTool && activeTool !== 'auto') {
        var t = tools.find(function(x){ return x.id === activeTool; });
        if (t) showSlider(t);
    }
}
document.getElementById('autoBtn').addEventListener('click', function() { applyAutoEnhance(); });

// ===== معاينات الفلاتر =====
function buildFilterThumbs() {
    var row = document.getElementById('filtersScroll');
    row.innerHTML = '';
    if (!originalImage) return;
    var img = workingImage || originalImage;
    var minD = Math.min(img.width, img.height);
    var sx = (img.width - minD) / 2;
    var sy = (img.height - minD) / 2;

    for (var i = 0; i < filters.length; i++) {
        (function(f) {
            var item = document.createElement('div');
            item.className = 'filter-item' + (f.id === currentFilter ? ' active' : '');

            var wrap = document.createElement('div');
            wrap.className = 'filter-thumb';
            var c = document.createElement('canvas');
            c.width = 82; c.height = 82;
            var tctx = c.getContext('2d');
            if (f.css) tctx.filter = f.css;
            tctx.drawImage(img, sx, sy, minD, minD, 0, 0, 82, 82);
            wrap.appendChild(c);

            var label = document.createElement('span');
            label.textContent = f.label;

            item.appendChild(wrap);
            item.appendChild(label);

            item.addEventListener('click', function() {
                currentFilter = f.id;
                var allF = document.querySelectorAll('.filter-item');
                for (var j = 0; j < allF.length; j++) allF[j].classList.remove('active');
                item.classList.add('active');
                renderImage();
            });

            row.appendChild(item);
        })(filters[i]);
    }
}

// ===== القص =====
var cropRBtns = document.querySelectorAll('.crop-r-btn');
for (var ci = 0; ci < cropRBtns.length; ci++) {
    (function(btn) {
        btn.addEventListener('click', function() {
            var allR = document.querySelectorAll('.crop-r-btn');
            for (var j = 0; j < allR.length; j++) allR[j].classList.remove('active');
            btn.classList.add('active');
            cropRatio = btn.dataset.ratio;
            isCropping = false; cropStart = null; cropEnd = null;
            cropOv.classList.remove('show');
            renderImage();
        });
    })(cropRBtns[ci]);
}

function drawCropOverlay() {
    if (!cropStart || !cropEnd) return;
    var rect = canvas.getBoundingClientRect();
    cropOv.width = rect.width;
    cropOv.height = rect.height;
    cropOv.style.width = rect.width + 'px';
    cropOv.style.height = rect.height + 'px';
    cropOvCtx.clearRect(0, 0, cropOv.width, cropOv.height);

    var x1 = Math.min(cropStart.x, cropEnd.x);
    var y1 = Math.min(cropStart.y, cropEnd.y);
    var x2 = Math.max(cropStart.x, cropEnd.x);
    var y2 = Math.max(cropStart.y, cropEnd.y);

    if (cropRatio !== 'free') {
        var parts = cropRatio.split(':');
        var rw = parseInt(parts[0]);
        var rh = parseInt(parts[1]);
        var ratio = rw / rh;
        var cw = x2 - x1;
        var ch = y2 - y1;
        if (cw / ch > ratio) { x2 = x1 + ch * ratio; }
        else { y2 = y1 + cw / ratio; }
    }

    cropOvCtx.fillStyle = 'rgba(0,0,0,0.5)';
    cropOvCtx.fillRect(0, 0, cropOv.width, cropOv.height);
    cropOvCtx.clearRect(x1, y1, x2 - x1, y2 - y1);

    cropOvCtx.strokeStyle = '#ffffff';
    cropOvCtx.lineWidth = 1;
    cropOvCtx.setLineDash([5, 3]);
    cropOvCtx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    cropOvCtx.setLineDash([]);

    // خطوط الأthirds
    cropOvCtx.strokeStyle = 'rgba(255,255,255,0.25)';
    cropOvCtx.lineWidth = 0.5;
    var tw = (x2 - x1) / 3;
    var th = (y2 - y1) / 3;
    for (var i = 1; i < 3; i++) {
        cropOvCtx.beginPath(); cropOvCtx.moveTo(x1 + tw * i, y1); cropOvCtx.lineTo(x1 + tw * i, y2); cropOvCtx.stroke();
        cropOvCtx.beginPath(); cropOvCtx.moveTo(x1, y1 + th * i); cropOvCtx.lineTo(x2, y1 + th * i); cropOvCtx.stroke();
    }
}

function getCropPos(e) {
    var rect = cropOv.getBoundingClientRect();
    var touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function handleCropStart(e) { e.preventDefault(); isCropping = true; cropStart = getCropPos(e); cropEnd = { x: cropStart.x, y: cropStart.y }; }
function handleCropMove(e) { if (!isCropping) return; e.preventDefault(); cropEnd = getCropPos(e); drawCropOverlay(); }
function handleCropEnd() { isCropping = false; drawCropOverlay(); }

cropOv.addEventListener('touchstart', handleCropStart, { passive: false });
cropOv.addEventListener('touchmove', handleCropMove, { passive: false });
cropOv.addEventListener('touchend', handleCropEnd);
cropOv.addEventListener('mousedown', handleCropStart);
cropOv.addEventListener('mousemove', handleCropMove);
cropOv.addEventListener('mouseup', handleCropEnd);

// تفعيل القص
document.getElementById('imageArea').addEventListener('click', function() {
    if (activePanel === 'crop' && !isCropping) {
        cropOv.classList.add('show');
        cropStart = null; cropEnd = null; isCropping = false;
        showToast('اسحب على الصورة لتحديد منطقة القص');
    }
});

// تطبيق القص
document.getElementById('cropApplyBtn').addEventListener('click', function() {
    if (!cropStart || !cropEnd) { showToast('اسحب على الصورة أولاً'); return; }
    var rect = canvas.getBoundingClientRect();
    var scX = canvas.width / rect.width;
    var scY = canvas.height / rect.height;

    var x1 = Math.min(cropStart.x, cropEnd.x) * scX;
    var y1 = Math.min(cropStart.y, cropEnd.y) * scY;
    var x2 = Math.max(cropStart.x, cropEnd.x) * scX;
    var y2 = Math.max(cropStart.y, cropEnd.y) * scY;

    if (cropRatio !== 'free') {
        var parts = cropRatio.split(':');
        var rw = parseInt(parts[0]);
        var rh = parseInt(parts[1]);
        var ratio = rw / rh;
        var cw = x2 - x1;
        var ch = y2 - y1;
        if (cw / ch > ratio) { x2 = x1 + ch * ratio; }
        else { y2 = y1 + cw / ratio; }
    }

    x1 = Math.max(0, Math.round(x1));
    y1 = Math.max(0, Math.round(y1));
    x2 = Math.min(canvas.width, Math.round(x2));
    y2 = Math.min(canvas.height, Math.round(y2));
    var cw = x2 - x1;
    var ch = y2 - y1;
    if (cw < 10 || ch < 10) { showToast('منطقة القص صغيرة جداً'); return; }

    var img = workingImage || originalImage;
    var rot = freeRotation * Math.PI / 180;
    var absC = Math.abs(Math.cos(rot));
    var absS = Math.abs(Math.sin(rot));
    var fw = Math.ceil(img.width * absC + img.height * absS);
    var fh = Math.ceil(img.width * absS + img.height * absC);

    var tmpC = document.createElement('canvas');
    tmpC.width = fw; tmpC.height = fh;
    var tmpCtx = tmpC.getContext('2d');
    tmpCtx.translate(fw / 2, fh / 2);
    tmpCtx.rotate(rot);
    tmpCtx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    tmpCtx.drawImage(img, -img.width / 2, -img.height / 2);

    var cropped = document.createElement('canvas');
    cropped.width = cw; cropped.height = ch;
    var crCtx = cropped.getContext('2d');
    crCtx.drawImage(tmpC, x1, y1, cw, ch, 0, 0, cw, ch);

    var newImg = new Image();
    newImg.onload = function() {
        workingImage = newImg;
        freeRotation = 0; flipH = false; flipV = false;
        document.getElementById('rotSlider').value = 0;
        document.getElementById('rotFill').style.width = '50%';
        document.getElementById('rotVal').textContent = '0°';
        cropStart = null; cropEnd = null;
        cropOv.classList.remove('show');
        renderImage();
        showToast('تم تطبيق القص');
    };
    newImg.src = cropped.toDataURL();
});

document.getElementById('cropCancelBtn').addEventListener('click', function() {
    isCropping = false; cropStart = null; cropEnd = null;
    cropOv.classList.remove('show'); renderImage();
});

// ===== التدوير =====
document.getElementById('rotLeft').addEventListener('click', function() {
    freeRotation = ((freeRotation - 90) % 360 + 360) % 360;
    if (freeRotation > 180) freeRotation -= 360;
    updateRotSlider(); renderImage();
});
document.getElementById('rotRight').addEventListener('click', function() {
    freeRotation = ((freeRotation + 90) % 360 + 360) % 360;
    if (freeRotation > 180) freeRotation -= 360;
    updateRotSlider(); renderImage();
});

function updateRotSlider() {
    document.getElementById('rotSlider').value = freeRotation;
    var pct = ((freeRotation + 180) / 360) * 100;
    document.getElementById('rotFill').style.width = pct + '%';
    document.getElementById('rotFill').classList.toggle('neg', freeRotation < 0);
    document.getElementById('rotVal').textContent = freeRotation + '°';
}

document.getElementById('rotSlider').addEventListener('input', function() {
    freeRotation = parseInt(this.value);
    updateRotSlider(); renderImage();
});

document.getElementById('rotReset').addEventListener('click', function() {
    freeRotation = 0; updateRotSlider(); renderImage();
});

document.getElementById('flipHBtn').addEventListener('click', function() {
    flipH = !flipH; renderImage(); showToast(flipH ? 'عكس أفقي' : 'إلغاء العكس الأفقي');
});
document.getElementById('flipVBtn').addEventListener('click', function() {
    flipV = !flipV; renderImage(); showToast(flipV ? 'عكس رأسي' : 'إلغاء العكس الرأسي');
});

// ===== قبل/بعد =====
var cmpTimer = null;
canvas.addEventListener('pointerdown', function() {
    if (activePanel) return;
    cmpTimer = setTimeout(function() {
        isComparing = true;
        document.getElementById('compareBadge').classList.add('show');
        renderImage(true);
    }, 400);
});
canvas.addEventListener('pointerup', endCompare);
canvas.addEventListener('pointerleave', endCompare);
function endCompare() {
    clearTimeout(cmpTimer);
    if (isComparing) {
        isComparing = false;
        document.getElementById('compareBadge').classList.remove('show');
        renderImage();
    }
}

// ===== إلغاء =====
document.getElementById('btnCancel').addEventListener('click', function() {
    closeAllPanels();
    resetAll(false);
    originalImage = null; workingImage = null;
    document.getElementById('uploadScreen').classList.remove('hidden');
    document.getElementById('topbar').classList.remove('show');
    document.getElementById('bottomBar').classList.remove('show');
    fileInput.value = '';
});

// ===== تم (حفظ) =====
document.getElementById('btnDone').addEventListener('click', function() {
    if (!originalImage) return;
    renderImage(false);
    var link = document.createElement('a');
    link.download = 'edited_photo.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('تم حفظ الصورة');
});

// ===== إغلاق اللوحات =====
function closeAllPanels() {
    var pKeys = Object.keys(panelMap);
    for (var i = 0; i < pKeys.length; i++) panelMap[pKeys[i]].classList.remove('open');
    activePanel = null;
    var allTabs = document.querySelectorAll('.tab-btn');
    for (var j = 0; j < allTabs.length; j++) allTabs[j].classList.remove('active');
    activeTool = null;
    isCropping = false; cropStart = null; cropEnd = null;
    cropOv.classList.remove('show');
    document.getElementById('sliderArea').classList.remove('show');
    renderImage();
}

// سحب للأسفل لإغلاق
var allHandles = document.querySelectorAll('.panel-handle');
for (var hi = 0; hi < allHandles.length; hi++) {
    (function(handle) {
        var panel = handle.closest('.tool-panel');
        var startY = 0;

        function onS(e) {
            var t = e.touches ? e.touches[0] : e;
            startY = t.clientY;
            panel.style.transition = 'none';
        }
        function onM(e) {
            var t = e.touches ? e.touches[0] : e;
            var dy = t.clientY - startY;
            if (dy > 0 && panel.classList.contains('open')) {
                panel.style.transform = 'translateY(' + dy + 'px)';
            }
        }
        function onE(e) {
            var t = e.changedTouches ? e.changedTouches[0] : e;
            var dy = t.clientY - startY;
            panel.style.transition = '';
            panel.style.transform = '';
            if (dy > 70) closeAllPanels();
        }

        handle.addEventListener('touchstart', onS, { passive: true });
        handle.addEventListener('touchmove', onM, { passive: true });
        handle.addEventListener('touchend', onE);
        handle.addEventListener('mousedown', onS);
        document.addEventListener('mousemove', onM);
        document.addEventListener('mouseup', onE);
    })(allHandles[hi]);
}

// ===== اختصارات =====
document.addEventListener('keydown', function(e) {
    if (!originalImage) return;
    if (e.key === 'Escape') closeAllPanels();
});
</script>
