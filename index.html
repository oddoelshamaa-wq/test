<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --card2: #2c2c2e;
            --sep: #38383a;
            --text: #ffffff;
            --text2: #8e8e93;
            --blue: #0a84ff;
            --orange: #ff9f0a;
            --red: #ff453a;
            --green: #30d158;
            --teal: #64d2ff;
            --purple: #bf5af2;
            --pink: #ff375f;
            --yellow: #ffd60a;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; width: 100vw; overflow: hidden;
            position: fixed; top:0; left:0; user-select: none;
        }

        /* شاشة الرفع */
        .upload-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
            background: var(--bg); gap: 20px;
        }
        .upload-screen.hidden { display: none; }
        .upload-icon { width:100px; height:100px; border-radius:28px; background:var(--card);
            display:flex; align-items:center; justify-content:center; color:var(--blue); font-size:44px; }
        .upload-title { font-size:24px; font-weight:700; }
        .upload-sub { font-size:15px; color:var(--text2); text-align:center; line-height:1.5; }
        .upload-btn {
            margin-top:8px; padding:14px 44px; border-radius:14px;
            background:var(--blue); color:#fff; font-size:17px; font-weight:600;
            border:none; font-family:inherit; cursor:pointer;
            transition: transform 0.15s, opacity 0.15s;
        }
        .upload-btn:active { transform:scale(0.96); opacity:0.8; }
        .upload-hint { font-size:12px; color:var(--text2); opacity:0.5; }
        .drop-zone {
            position:fixed; inset:0; z-index:499; display:none;
            align-items:center; justify-content:center;
            background:rgba(10,132,255,0.15); backdrop-filter:blur(10px);
            border:3px dashed var(--blue); border-radius:0;
        }
        .drop-zone.show { display:flex; }
        .drop-zone span { font-size:22px; font-weight:600; color:var(--blue); }

        /* شريط علوي */
        .topbar {
            position:fixed; top:0; left:0; right:0; height:96px;
            padding-top:48px; display:flex; align-items:center;
            justify-content:space-between; padding-left:16px; padding-right:16px;
            background:linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 70%, transparent 100%);
            z-index:100; opacity:0; transition:opacity 0.3s; pointer-events:none;
        }
        .topbar.show { opacity:1; pointer-events:auto; }
        .topbar button { font-size:17px; background:none; border:none; font-family:inherit; cursor:pointer; padding:8px 4px; }
        .btn-cancel { color:var(--text); opacity:0.8; }
        .btn-done { color:var(--blue); font-weight:600; }
        .top-title { font-size:17px; font-weight:600; }

        /* منطقة الصورة */
        .image-area { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
        #mainCanvas { max-width:100%; max-height:100%; display:block; }

        /* نصيحة قبل/بعد */
        .compare-badge {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.7); backdrop-filter:blur(10px);
            padding:10px 24px; border-radius:20px; font-size:15px; font-weight:600;
            z-index:90; opacity:0; transition:opacity 0.2s; pointer-events:none;
        }
        .compare-badge.show { opacity:1; }

        /* شريط التبويبات السفلي */
        .bottom-bar {
            position:fixed; bottom:0; left:0; right:0; z-index:100;
            opacity:0; transition:opacity 0.3s; pointer-events:none;
        }
        .bottom-bar.show { opacity:1; pointer-events:auto; }
        .tabs {
            display:flex; justify-content:space-around; align-items:center;
            padding:8px 4px 28px;
            background:linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.75) 70%, transparent 100%);
        }
        .tab-btn {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            background:none; border:none; color:var(--text2); font-family:inherit;
            font-size:10px; cursor:pointer; padding:6px 14px; border-radius:10px;
            transition:color 0.2s;
        }
        .tab-btn.active { color:var(--yellow); }
        .tab-btn svg { width:22px; height:22px; fill:currentColor; }
        .tab-btn.active svg { filter:drop-shadow(0 0 4px rgba(255,214,10,0.4)); }

        /* لوحة الأدوات */
        .tool-panel {
            position:fixed; bottom:0; left:0; right:0;
            background:var(--card); border-top-left-radius:20px; border-top-right-radius:20px;
            z-index:150; transform:translateY(100%);
            transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
            max-height:60vh; overflow:hidden; display:flex; flex-direction:column;
        }
        .tool-panel.open { transform:translateY(0); }
        .panel-handle { width:36px; height:5px; border-radius:3px; background:var(--sep); margin:8px auto 0; flex-shrink:0; }
        .panel-body { flex:1; overflow-y:auto; padding:12px 0 36px; -webkit-overflow-scrolling:touch; }
        .panel-body::-webkit-scrollbar { display:none; }

        /* لوحة التعديل - الأدوات الدائرية */
        .edit-tools-row {
            display:flex; overflow-x:auto; gap:16px; padding:10px 16px 6px;
            scrollbar-width:none; -webkit-overflow-scrolling:touch;
        }
        .edit-tools-row::-webkit-scrollbar { display:none; }

        .edit-circle {
            flex:0 0 68px; display:flex; flex-direction:column; align-items:center;
            gap:8px; background:none; border:none; cursor:pointer; outline:none; padding:0;
        }
        .circle-icon {
            width:56px; height:56px; border-radius:50%;
            background:#151515; border:2.5px solid #252525;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
            position:relative;
        }
        .circle-icon svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .edit-circle.active .circle-icon { border-color:var(--yellow); background:#0a0a0a; box-shadow:0 0 12px rgba(255,214,10,0.2); }
        .edit-circle.modified .circle-icon::after {
            content:''; position:absolute; inset:-5px;
            border:2px solid var(--yellow); border-radius:50%;
        }
        .edit-circle span { font-size:11px; color:var(--text2); font-weight:500; white-space:nowrap; transition:color 0.2s; }
        .edit-circle.active span { color:#fff; font-weight:600; }

        /* ألوان خلفية الأيقونات */
        .clr-auto { background:rgba(255,159,10,0.18); }
        .clr-exposure { background:rgba(10,132,255,0.18); }
        .clr-brilliance { background:rgba(100,210,255,0.18); }
        .clr-highlights { background:rgba(255,214,10,0.18); }
        .clr-shadows { background:rgba(191,90,242,0.18); }
        .clr-contrast { background:rgba(255,55,95,0.18); }
        .clr-brightness { background:rgba(255,159,10,0.18); }
        .clr-blackpoint { background:rgba(142,142,147,0.18); }
        .clr-saturation { background:rgba(48,209,88,0.18); }
        .clr-vibrance { background:rgba(255,55,95,0.18); }
        .clr-warmth { background:rgba(255,159,10,0.18); }
        .clr-tint { background:rgba(100,210,255,0.18); }
        .clr-sharpness { background:rgba(10,132,255,0.18); }
        .clr-definition { background:rgba(191,90,242,0.18); }
        .clr-noise { background:rgba(142,142,147,0.18); }
        .clr-vignette { background:rgba(255,55,95,0.18); }

        /* سلايدر الآيفوني */
        .slider-area { padding:10px 24px 0; display:none; }
        .slider-area.show { display:block; }
        .slider-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .slider-head span:first-child { font-size:15px; font-weight:600; }
        .slider-reset { font-size:14px; color:var(--blue); background:none; border:none; font-family:inherit; cursor:pointer; }
        .slider-track-wrap { position:relative; width:100%; height:28px; display:flex; align-items:center; }
        .slider-track-bg { position:absolute; left:0; right:0; height:4px; border-radius:2px; background:var(--card2); overflow:hidden; }
        .slider-track-fill { height:100%; border-radius:2px; background:var(--blue); width:50%; transition:width 0.04s; }
        .slider-track-fill.neg { background:var(--orange); }
        input[type=range].ios-slider {
            -webkit-appearance:none; appearance:none; position:relative;
            width:100%; height:28px; background:transparent; z-index:2; cursor:pointer;
        }
        input[type=range].ios-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:28px; height:28px; border-radius:50%;
            background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.15);
        }
        input[type=range].ios-slider::-moz-range-thumb {
            width:28px; height:28px; border-radius:50%; border:none;
            background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.5);
        }
        .slider-labels { display:flex; justify-content:space-between; margin-top:2px; }
        .slider-labels span { font-size:12px; color:var(--text2); }
        .slider-val-display { font-weight:700; }

        /* لوحة الفلاتر */
        .filters-row {
            display:flex; gap:12px; overflow-x:auto; padding:12px 16px 20px;
            scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
        }
        .filters-row::-webkit-scrollbar { display:none; }
        .filter-item {
            flex-shrink:0; width:88px; display:flex; flex-direction:column;
            align-items:center; gap:8px; cursor:pointer; scroll-snap-align:start;
        }
        .filter-img-wrap {
            width:88px; height:88px; border-radius:14px; overflow:hidden;
            border:3px solid transparent; transition:border-color 0.2s;
        }
        .filter-item.active .filter-img-wrap { border-color:var(--yellow); }
        .filter-img-wrap canvas { width:100%; height:100%; display:block; }
        .filter-item span { font-size:11px; color:var(--text2); transition:color 0.2s; }
        .filter-item.active span { color:var(--yellow); font-weight:600; }

        /* لوحة القص */
        .crop-ratios { display:flex; gap:10px; flex-wrap:wrap; padding:0 20px; margin-bottom:16px; }
        .crop-r-btn {
            padding:8px 18px; border-radius:20px; background:var(--card2);
            border:none; color:var(--text); font-family:inherit; font-size:14px;
            cursor:pointer; transition:background 0.2s, color 0.2s;
        }
        .crop-r-btn.active { background:var(--yellow); color:#000; font-weight:600; }
        .crop-hint { text-align:center; color:var(--text2); font-size:14px; line-height:1.6; padding:0 20px; }
        .crop-actions { display:flex; justify-content:center; gap:12px; margin-top:20px; padding:0 20px; }
        .crop-act-btn {
            padding:12px 28px; border-radius:12px; border:none;
            font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
            display:flex; align-items:center; gap:8px; transition:transform 0.15s, opacity 0.15s;
        }
        .crop-act-btn:active { transform:scale(0.96); opacity:0.8; }
        .crop-act-btn.primary { background:var(--yellow); color:#000; }
        .crop-act-btn.secondary { background:var(--card2); color:var(--text); }

        /* لوحة التدوير */
        .rotate-btns { display:flex; justify-content:center; gap:30px; padding:16px 0; }
        .rot-btn {
            width:68px; height:68px; border-radius:50%; background:var(--card2);
            border:none; color:var(--text); font-size:22px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:transform 0.15s, background 0.2s;
        }
        .rot-btn:active { transform:scale(0.9); background:var(--sep); }
        .rotate-slider-area { padding:8px 24px 0; }
        .flip-row { display:flex; justify-content:center; gap:16px; padding:20px 16px 0; }
        .flip-btn {
            padding:10px 22px; border-radius:12px; background:var(--card2);
            border:none; color:var(--text); font-family:inherit; font-size:14px;
            cursor:pointer; display:flex; align-items:center; gap:8px; transition:background 0.2s;
        }
        .flip-btn:active { background:var(--sep); }

        /* لوحة التلقائي */
        .auto-content { text-align:center; padding:30px 20px; color:var(--text2); font-size:15px; line-height:1.7; }
        .auto-btn {
            margin-top:20px; padding:14px 40px; border-radius:50px;
            background:linear-gradient(135deg, var(--orange), var(--pink));
            color:#fff; font-size:17px; font-weight:600; border:none;
            font-family:inherit; cursor:pointer; transition:transform 0.15s;
        }
        .auto-btn:active { transform:scale(0.95); }

        /* إشعار */
        .toast {
            position:fixed; top:60px; left:50%; transform:translateX(-50%) translateY(-30px);
            background:var(--card); border:1px solid var(--sep);
            padding:12px 24px; border-radius:14px; font-size:15px; font-weight:500;
            z-index:999; backdrop-filter:blur(20px); opacity:0;
            transition:all 0.3s cubic-bezier(0.32,0.72,0,1); pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* طبقة القص */
        .crop-overlay {
            position:fixed; inset:0; z-index:80; display:none; cursor:crosshair;
        }
        .crop-overlay.show { display:block; }

        @media(min-width:768px) {
            .tool-panel { max-width:500px; left:50%; transform:translate(-50%,100%); border-bottom-left-radius:20px; border-bottom-right-radius:20px; }
            .tool-panel.open { transform:translate(-50%,0); }
        }
        @media(prefers-reduced-motion:reduce) {
            *{ transition-duration:0.01ms!important; animation-duration:0.01ms!important; }
        }
    </style>
</head>
<body>

<!-- شاشة الرفع -->
<div class="upload-screen" id="uploadScreen">
    <div class="upload-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
    </div>
    <div class="upload-title">الصور</div>
    <div class="upload-sub">اختار صورة من جهازك<br>لتعديلها بأدوات احترافية</div>
    <button class="upload-btn" id="uploadBtn">اختر صورة</button>
    <div class="upload-hint">اسحب وأفلت أو اضغط للاختيار</div>
    <input type="file" id="fileInput" accept="image/*" hidden>
</div>

<!-- منطقة السحب -->
<div class="drop-zone" id="dropZone"><span>أسقط الصورة هنا</span></div>

<!-- شريط علوي -->
<div class="topbar" id="topbar">
    <button class="btn-cancel" id="btnCancel">إلغاء</button>
    <span class="top-title" id="topTitle">تعديل</span>
    <button class="btn-done" id="btnDone">تم</button>
</div>

<!-- منطقة الصورة -->
<div class="image-area"><canvas id="mainCanvas"></canvas></div>

<!-- نصيحة المقارنة -->
<div class="compare-badge" id="compareBadge">الأصل</div>

<!-- طبقة القص -->
<canvas class="crop-overlay" id="cropOverlay"></canvas>

<!-- شريط التبويبات -->
<div class="bottom-bar" id="bottomBar">
    <div class="tabs">
        <button class="tab-btn" data-tab="auto">
            <svg viewBox="0 0 24 24"><path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/></svg>
            <span>تلقائي</span>
        </button>
        <button class="tab-btn" data-tab="adjust">
            <svg viewBox="0 0 24 24"><path d="M3 17V19H9V17H3ZM3 5V7H13V5H3ZM13 21V19H21V17H13V15H11V21H13ZM7 9V11H3V13H7V15H9V9H7ZM21 13V11H11V13H21ZM15 9H17V7H21V5H17V3H15V9Z"/></svg>
            <span>تعديل</span>
        </button>
        <button class="tab-btn" data-tab="filters">
            <svg viewBox="0 0 24 24"><path d="M3 5H7L9 3H15L17 5H21V7H3V5ZM5 8H19V20C19 20.55 18.55 21 18 21H6C5.45 21 5 20.55 5 20V8ZM8 10V19H10V10H8ZM14 10V19H16V10H14Z"/></svg>
            <span>فلاتر</span>
        </button>
        <button class="tab-btn" data-tab="crop">
            <svg viewBox="0 0 24 24"><path d="M17 15H7V7H9V13H15V7H17V15ZM5 3H19C20.1 3 21 3.9 21 5V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3ZM5 5V19H19V5H5Z"/></svg>
            <span>قص</span>
        </button>
        <button class="tab-btn" data-tab="rotate">
            <svg viewBox="0 0 24 24"><path d="M7.11 8.53L5.7 7.11C4.8 8.27 4.24 9.61 4.07 11H2.05C2.25 9.14 2.99 7.44 4.17 6.05L2.71 4.59L4.13 3.17L7.11 6.15V8.53ZM21.95 13H19.93C19.76 14.39 19.2 15.73 18.3 16.89L16.89 15.47V18.85L19.87 21.83L21.29 20.41L19.83 18.95C21.01 17.56 21.75 15.86 21.95 13ZM16 5H18V11H16V5ZM8 13H14V15H8V13Z"/></svg>
            <span>تدوير</span>
        </button>
    </div>
</div>

<!-- لوحة التلقائي -->
<div class="tool-panel" id="panelAuto">
    <div class="panel-handle"></div>
    <div class="panel-body">
        <div class="auto-content">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="var(--orange)" style="margin-bottom:12px;opacity:0.7;"><path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/></svg>
            <p>تحسين تلقائي للصورة<br>يضبط الإضاءة والألوان والتباين</p>
            <button class="auto-btn" id="autoBtn">تحسين تلقائي</button>
        </div>
    </div>
</div>

<!-- لوحة التعديل -->
<div class="tool-panel" id="panelAdjust">
    <div class="panel-handle"></div>
    <div class="panel-body">
        <div class="edit-tools-row" id="editToolsRow"></div>
        <div class="slider-area" id="sliderArea"></div>
    </div>
</div>

<!-- لوحة الفلاتر -->
<div class="tool-panel" id="panelFilters">
    <div class="panel-handle"></div>
    <div class="panel-body">
        <div class="filters-row" id="filtersRow"></div>
    </div>
</div>

<!-- لوحة القص -->
<div class="tool-panel" id="panelCrop">
    <div class="panel-handle"></div>
    <div class="panel-body">
        <div class="crop-ratios" id="cropRatios">
            <button class="crop-r-btn active" data-ratio="free">حر</button>
            <button class="crop-r-btn" data-ratio="1:1">1:1</button>
            <button class="crop-r-btn" data-ratio="4:3">4:3</button>
            <button class="crop-r-btn" data-ratio="3:4">3:4</button>
            <button class="crop-r-btn" data-ratio="16:9">16:9</button>
            <button class="crop-r-btn" data-ratio="9:16">9:16</button>
        </div>
        <p class="crop-hint">اختر نسبة القص ثم اضغط على الصورة واسحب لتحديد المنطقة</p>
        <div class="crop-actions">
            <button class="crop-act-btn primary" id="cropApplyBtn"><i class="fas fa-check"></i> تطبيق</button>
            <button class="crop-act-btn secondary" id="cropCancelBtn"><i class="fas fa-times"></i> إلغاء</button>
        </div>
    </div>
</div>

<!-- لوحة التدوير -->
<div class="tool-panel" id="panelRotate">
    <div class="panel-handle"></div>
    <div class="panel-body">
        <div class="rotate-btns">
            <button class="rot-btn" id="rotLeft" aria-label="تدوير يسار"><i class="fas fa-undo"></i></button>
            <button class="rot-btn" id="rotRight" aria-label="تدوير يمين"><i class="fas fa-redo"></i></button>
        </div>
        <div class="rotate-slider-area">
            <div class="slider-head">
                <span>زاوية الدوران</span>
                <button class="slider-reset" id="rotReset">إعادة تعيين</button>
            </div>
            <div class="slider-track-wrap">
                <div class="slider-track-bg"><div class="slider-track-fill" id="rotFill" style="width:50%"></div></div>
                <input type="range" class="ios-slider" id="rotSlider" min="-180" max="180" value="0">
            </div>
            <div class="slider-labels"><span>-180°</span><span id="rotVal" class="slider-val-display" style="color:var(--blue)">0°</span><span>180°</span></div>
        </div>
        <div class="flip-row">
            <button class="flip-btn" id="flipHBtn"><i class="fas fa-arrows-alt-h"></i> عكس أفقي</button>
            <button class="flip-btn" id="flipVBtn"><i class="fas fa-arrows-alt-v"></i> عكس رأسي</button>
        </div>
    </div>
</div>

<!-- إشعار -->
<div class="toast" id="toast"></div>

<script>
// ===== المتغيرات الأساسية =====
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const cropCanvas = document.getElementById('cropOverlay');

// ===== الإشعار =====
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== بناء فلتر CSS من التعديلات =====
function buildAdjustCSS() {
    const a = adj;
    let brightness = 100 + (a.brightness * 0.5) + (a.exposure * 0.5) + (a.brilliance * 0.2) + (a.highlights * 0.15) - (a.shadows * 0.1);
    let contrast = 100 + (a.contrast * 0.4) + (a.definition * 0.2) + (a.brilliance * 0.15);
    let saturate = 100 + (a.saturation * 0.8) + (a.vibrance * 0.4) + (a.brilliance * 0.2);

    brightness = Math.max(0, Math.min(250, brightness));
    contrast = Math.max(0, Math.min(250, contrast));
    saturate = Math.max(0, Math.min(300, saturate));

    let hueShift = a.warmth * 0.15 + a.tint * 0.1;
    let f = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturate}%)`;
    if (Math.abs(hueShift) > 0.5) f += ` hue-rotate(${hueShift}deg)`;
    return f;
}

function getFullFilter() {
    const fObj = filters.find(f => f.id === currentFilter);
    const adjF = buildAdjustCSS();
    if (!fObj || !fObj.css) return adjF;
    return fObj.css + ' ' + adjF;
}

// ===== رسم الصورة الرئيسية =====
function renderImage(useOriginal) {
    const img = workingImage || originalImage;
    if (!img) return;

    const rot = freeRotation * Math.PI / 180;
    const absC = Math.abs(Math.cos(rot));
    const absS = Math.abs(Math.sin(rot));
    let w = Math.ceil(img.width * absC + img.height * absS);
    let h = Math.ceil(img.width * absS + img.height * absC);

    canvas.width = w;
    canvas.height = h;
    ctx.clearRect(0, 0, w, h);
    ctx.save();

    if (!useOriginal) ctx.filter = getFullFilter();

    ctx.translate(w / 2, h / 2);
    ctx.rotate(rot);
    ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    ctx.drawImage(img, -img.width / 2, -img.height / 2);
    ctx.restore();

    // فينيت
    if (!useOriginal && adj.vignette !== 0) {
        const str = Math.abs(adj.vignette) / 100;
        const grad = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.3, w/2, h/2, Math.max(w,h)*0.7);
        if (adj.vignette < 0) {
            grad.addColorStop(0, `rgba(255,255,255,${str * 0.5})`);
            grad.addColorStop(1, 'rgba(255,255,255,0)');
        } else {
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, `rgba(0,0,0,${str * 0.7})`);
        }
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
    }
}

// ===== رفع الصورة =====
function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) { showToast('اختر ملف صورة صالح'); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            originalImage = img;
            workingImage = img;
            appliedCrop = null;
            document.getElementById('uploadScreen').classList.add('hidden');
            document.getElementById('topbar').classList.add('show');
            document.getElementById('bottomBar').classList.add('show');
            resetAll(false);
            renderImage();
            showToast('تم تحميل الصورة');
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function buildEditTools() {
    const row = document.getElementById('editToolsRow');
    row.innerHTML = '';
    tools.forEach(tool => {
        const btn = document.createElement('button');
        btn.className = 'edit-circle' + (adj[tool.id] !== 0 ? ' modified' : '');
        btn.id = 'ec-' + tool.id;
        btn.innerHTML = `<div class="circle-icon ${tool.cls}"><svg viewBox="0 0 24 24">${tool.icon}</svg></div><span>${tool.label}</span>`;
        btn.addEventListener('click', () => {
            document.querySelectorAll('.edit-circle').forEach(e => e.classList.remove('active'));
            btn.classList.add('active');
            activeTool = tool.id;
            if (tool.id === 'auto') {
                applyAutoEnhance();
            } else {
                showSlider(tool);
            }
        });
        row.appendChild(btn);
    });
}

// تحديث حالة modified
function updateModifiedStates() {
    tools.forEach(t => {
        const el = document.getElementById('ec-' + t.id);
        if (el) { el.classList.toggle('modified', adj[t.id] !== 0); }
    });
}

// ===== عرض السلايدر =====
function showSlider(tool) {
    const area = document.getElementById('sliderArea');
    const val = adj[tool.id] || 0;
    const min = tool.min !== undefined ? tool.min : -100;
    const max = tool.max !== undefined ? tool.max : 100;
    const pct = ((val - min) / (max - min)) * 100;
    const isNeg = val < (min < 0 ? 0 : min);

    area.innerHTML = `
        <div class="slider-head">
            <span>${tool.label}</span>
            <button class="slider-reset" id="sReset">إعادة تعيين</button>
        </div>
        <div class="slider-track-wrap">
            <div class="slider-track-bg"><div class="slider-track-fill ${isNeg?'neg':''}" id="sFill" style="width:${pct}%"></div></div>
            <input type="range" class="ios-slider" id="sSlider" min="${min}" max="${max}" value="${val}" step="1">
        </div>
        <div class="slider-labels">
            <span>${min}</span>
            <span id="sVal" class="slider-val-display" style="color:${isNeg?'var(--orange)':'var(--blue)'}">${val}</span>
            <span>${max}</span>
        </div>
    `;
    area.classList.add('show');

    const slider = document.getElementById('sSlider');
    const fill = document.getElementById('sFill');
    const valDisp = document.getElementById('sVal');

    slider.addEventListener('input', () => {
        const v = parseInt(slider.value);
        adj[tool.id] = v;
        const p = ((v - min) / (max - min)) * 100;
        fill.style.width = p + '%';
        const neg = v < (min < 0 ? 0 : min);
        fill.classList.toggle('neg', neg);
        valDisp.textContent = v;
        valDisp.style.color = neg ? 'var(--orange)' : 'var(--blue)';
        updateModifiedStates();
        renderImage();
    });
    slider.addEventListener('change', () => {});

    document.getElementById('sReset').addEventListener('click', () => {
        adj[tool.id] = 0;
        slider.value = 0;
        const p = ((0 - min) / (max - min)) * 100;
        fill.style.width = p + '%';
        fill.classList.remove('neg');
        valDisp.textContent = '0';
        valDisp.style.color = 'var(--blue)';
        updateModifiedStates();
        renderImage();
    });
}

function applyAutoEnhance() {
    adj.exposure = 10; adj.brilliance = 15; adj.highlights = -10;
    adj.shadows = 20; adj.contrast = 10; adj.saturation = 10;
    adj.vibrance = 15; adj.warmth = 5;

        const tool = tools.find(t => t.id === activeTool);

    }

// ===== معاينات الفلاتر =====
function buildFilterThumbs() {
    const row = document.getElementById('filtersRow');
    row.innerHTML = '';
    if (!originalImage) return;
    const img = workingImage || originalImage;
    const minD = Math.min(img.width, img.height);
    const sx = (img.width - minD) / 2;
    const sy = (img.height - minD) / 2;

    filters.forEach(f => {
        const item = document.createElement('div');
        item.className = 'filter-item' + (f.id === currentFilter ? ' active' : '');

        const wrap = document.createElement('div');
        wrap.className = 'filter-img-wrap';
        const c = document.createElement('canvas');
        c.width = 88; c.height = 88;
        const tctx = c.getContext('2d');
        if (f.css) tctx.filter = f.css;
        tctx.drawImage(img, sx, sy, minD, minD, 0, 0, 88, 88);
        wrap.appendChild(c);

        const label = document.createElement('span');
        label.textContent = f.label;

        item.appendChild(wrap);
        item.appendChild(label);

        item.addEventListener('click', () => {
            currentFilter = f.id;
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            renderImage();
        });

        row.appendChild(item);
    });
}

// رسم القص على طبقة منفصلة
function drawCropOverlay() {
    if (!isCropping || !cropStart || !cropEnd) return;
    const rect = canvas.getBoundingClientRect();
    cropCanvas.width = rect.width;
    cropCanvas.height = rect.height;
    cropCanvas.style.width = rect.width + 'px';
    cropCanvas.style.height = rect.height + 'px';
    cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);

    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    let x1 = Math.min(cropStart.x, cropEnd.x);
    let y1 = Math.min(cropStart.y, cropEnd.y);
    let x2 = Math.max(cropStart.x, cropEnd.x);
    let y2 = Math.max(cropStart.y, cropEnd.y);

    // تطبيق نسبة القص
    if (cropRatio !== 'free') {
        const [rw, rh] = cropRatio.split(':').map(Number);
        const ratio = rw / rh;
        const cw = x2 - x1;
        const ch = y2 - y1;
        if (cw / ch > ratio) {
            const newW = ch * ratio;
            x2 = x1 + newW;
        } else {
            const newH = cw / ratio;
            y2 = y1 + newH;
        }
    }

    // منطقة معتمة
    cropCtx.fillStyle = 'rgba(0,0,0,0.5)';
    cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
    cropCtx.clearRect(x1, y1, x2-x1, y2-y1);

    // إطار
    cropCtx.strokeStyle = '#fff';
    cropCtx.lineWidth = 1.5;
    cropCtx.setLineDash([6, 4]);
    cropCtx.strokeRect(x1, y1, x2-x1, y2-y1);
    cropCtx.setLineDash([]);

    // خطوط الأthirds
    cropCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    cropCtx.lineWidth = 0.5;
    const tw = (x2-x1)/3, th = (y2-y1)/3;
    for (let i=1; i<3; i++) {
        cropCtx.beginPath(); cropCtx.moveTo(x1+tw*i, y1); cropCtx.lineTo(x1+tw*i, y2); cropCtx.stroke();
        cropCtx.beginPath(); cropCtx.moveTo(x1, y1+th*i); cropCtx.lineTo(x2, y1+th*i); cropCtx.stroke();
    }
}

// أحداث القص على طبقة منفصلة
cropCanvas.addEventListener('touchstart', handleCropStart, {passive:false});
cropCanvas.addEventListener('touchmove', handleCropMove, {passive:false});
cropCanvas.addEventListener('touchend', handleCropEnd);
cropCanvas.addEventListener('mousedown', handleCropStart);
cropCanvas.addEventListener('mousemove', handleCropMove);
cropCanvas.addEventListener('mouseup', handleCropEnd);

function getCropPos(e) {
    const rect = cropCanvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function handleCropStart(e) {
    e.preventDefault();
    isCropping = true;
    cropStart = getCropPos(e);
    cropEnd = { ...cropStart };
}

function handleCropMove(e) {
    if (!isCropping) return;
    e.preventDefault();
    cropEnd = getCropPos(e);
    drawCropOverlay();
}

function handleCropEnd(e) {
    if (!isCropping) return;
    isCropping = false;
    drawCropOverlay();
}

document.getElementById('cropApplyBtn').addEventListener('click', () => {
    if (!cropStart || !cropEnd) { showToast('اسحب على الصورة أولاً لتحديد منطقة القص'); return; }
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    let x1 = Math.min(cropStart.x, cropEnd.x) * scaleX;
    let y1 = Math.min(cropStart.y, cropEnd.y) * scaleY;
    let x2 = Math.max(cropStart.x, cropEnd.x) * scaleX;
    let y2 = Math.max(cropStart.y, cropEnd.y) * scaleY;

    if (cropRatio !== 'free') {
        const [rw, rh] = cropRatio.split(':').map(Number);
        const ratio = rw / rh;
        const cw = x2 - x1;
        const ch = y2 - y1;
        if (cw / ch > ratio) { const nw = ch * ratio; x2 = x1 + nw; }
        else { const nh = cw / ratio; y2 = y1 + nh; }
    }

    x1 = Math.max(0, Math.round(x1));
    y1 = Math.max(0, Math.round(y1));
    x2 = Math.min(canvas.width, Math.round(x2));
    y2 = Math.min(canvas.height, Math.round(y2));

    const cw = x2 - x1;
    const ch = y2 - y1;
    if (cw < 10 || ch < 10) { showToast('منطقة القص صغيرة جداً'); return; }

    // رسم الصورة بدون فلاتر على كانفاس مؤقت
    const img = workingImage || originalImage;
    const rot = freeRotation * Math.PI / 180;
    const absC = Math.abs(Math.cos(rot));
    const absS = Math.abs(Math.sin(rot));
    let fw = Math.ceil(img.width * absC + img.height * absS);
    let fh = Math.ceil(img.width * absS + img.height * absC);

    const tmpC = document.createElement('canvas');
    tmpC.width = fw; tmpC.height = fh;
    const tmpCtx = tmpC.getContext('2d');
    tmpCtx.translate(fw/2, fh/2);
    tmpCtx.rotate(rot);
    tmpCtx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    tmpCtx.drawImage(img, -img.width/2, -img.height/2);

    // قص المنطقة
    const cropped = document.createElement('canvas');
    cropped.width = cw; cropped.height = ch;
    const crCtx = cropped.getContext('2d');
    crCtx.drawImage(tmpC, x1, y1, cw, ch, 0, 0, cw, ch);

    // إنشاء صورة جديدة
    const newImg = new Image();
    newImg.onload = function() {
        workingImage = newImg;
        appliedCrop = { x: x1, y: y1, w: cw, h: ch };
        freeRotation = 0;
        flipH = false; flipV = false;
        document.getElementById('rotSlider').value = 0;
        document.getElementById('rotFill').style.width = '50%';
        document.getElementById('rotVal').textContent = '0°';
        cropStart = null; cropEnd = null;
        cropCanvas.classList.remove('show');
        renderImage();
        showToast('تم تطبيق القص');
    };
    newImg.src = cropped.toDataURL();
});

document.getElementById('cropCancelBtn').addEventListener('click', () => {
    isCropping = false; cropStart = null; cropEnd = null;
    cropCanvas.classList.remove('show');
    renderImage();
});

// ===== التدوير =====
document.getElementById('rotLeft').addEventListener('click', () => {
    freeRotation = (freeRotation - 90 + 360) % 360;
    if (freeRotation > 180) freeRotation -= 360;
    updateRotSlider();
    renderImage();
});

document.getElementById('rotRight').addEventListener('click', () => {
    freeRotation = (freeRotation + 90) % 360;
    if (freeRotation > 180) freeRotation -= 360;
    updateRotSlider();
    renderImage();
});

function updateRotSlider() {
    const s = document.getElementById('rotSlider');
    s.value = freeRotation;
    const pct = ((freeRotation + 180) / 360) * 100;
    document.getElementById('rotFill').style.width = pct + '%';
    document.getElementById('rotFill').classList.toggle('neg', freeRotation < 0);
    document.getElementById('rotVal').textContent = freeRotation + '°';
    document.getElementById('rotVal').style.color = freeRotation < 0 ? 'var(--orange)' : 'var(--blue)';
}

document.getElementById('rotSlider').addEventListener('input', (e) => {
    freeRotation = parseInt(e.target.value);
    updateRotSlider();
    renderImage();
});

document.getElementById('rotReset').addEventListener('click', () => {
    freeRotation = 0;
    updateRotSlider();
    renderImage();
});

document.getElementById('flipHBtn').addEventListener('click', () => { flipH = !flipH; renderImage(); showToast(flipH ? 'عكس أفقي' : 'إلغاء العكس الأفقي'); });
document.getElementById('flipVBtn').addEventListener('click', () => { flipV = !flipV; renderImage(); showToast(flipV ? 'عكس رأسي' : 'إلغاء العكس الرأسي'); });

// ===== قبل/بعد (بالضغط المطول على الصورة) =====
let compareTimer = null;
canvas.addEventListener('pointerdown', (e) => {
    if (activePanel) return;
    compareTimer = setTimeout(() => {
        isComparing = true;
        document.getElementById('compareBadge').classList.add('show');
        renderImage(true);
    }, 400);
});
canvas.addEventListener('pointerup', () => {
    clearTimeout(compareTimer);
    if (isComparing) {
        isComparing = false;
        document.getElementById('compareBadge').classList.remove('show');
        renderImage();
    }
});
canvas.addEventListener('pointerleave', () => {
    clearTimeout(compareTimer);
    if (isComparing) {
        isComparing = false;
        document.getElementById('compareBadge').classList.remove('show');
        renderImage();
    }
});

// ===== زر إلغاء =====
document.getElementById('btnCancel').addEventListener('click', () => {
    closeAllPanels();
    resetAll(true);
    originalImage = null;
    workingImage = null;
    document.getElementById('uploadScreen').classList.remove('hidden');
    document.getElementById('topbar').classList.remove('show');
    document.getElementById('bottomBar').classList.remove('show');
    fileInput.value = '';
});

// ===== زر تم (حفظ/تحميل) =====
document.getElementById('btnDone').addEventListener('click', () => {
    if (!originalImage) return;
    // رسم النسخة النهائية
    renderImage(false);
    const link = document.createElement('a');
    link.download = 'edited_photo.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('تم حفظ الصورة');
});

// ===== إغلاق اللوحات =====
function closeAllPanels() {
    Object.values(panelMap).forEach(p => p.classList.remove('open'));
    activePanel = null;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    activeTool = null;
    isCropping = false; cropStart = null; cropEnd = null;
    cropCanvas.classList.remove('show');
    document.getElementById('sliderArea').classList.remove('show');
    renderImage();
}

// إغلاق اللوحة بالضغط على Handle
document.querySelectorAll('.panel-handle').forEach(handle => {
    handle.addEventListener('click', () => closeAllPanels());
    handle.style.cursor = 'pointer';
});

// ===== إغلاق اللوحة بالسحب للأسفل =====
document.querySelectorAll('.tool-panel').forEach(panel => {
    let startY = 0, startTransform = 0;
    const handle = panel.querySelector('.panel-handle');

    function onStart(e) {
        const touch = e.touches ? e.touches[0] : e;
        startY = touch.clientY;
        startTransform = panel.classList.contains('open') ? 0 : panel.offsetHeight;
        panel.style.transition = 'none';
    }

    function onMove(e) {
        const touch = e.touches ? e.touches[0] : e;
        const dy = touch.clientY - startY;
        if (dy > 0 && panel.classList.contains('open')) {
            panel.style.transform = `translateY(${dy}px)`;
        }
    }

    function onEnd(e) {
        const touch = e.changedTouches ? e.changedTouches[0] : e;
        const dy = touch.clientY - startY;
        panel.style.transition = '';
        panel.style.transform = '';
        if (dy > 80) {
            closeAllPanels();
        } else {
            if (panel.classList.contains('open')) {
                panel.style.transform = '';
            }
        }
    }

    handle.addEventListener('touchstart', onStart, {passive:true});
    handle.addEventListener('touchmove', onMove, {passive:true});
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
});

// ===== اختصارات لوحة المفاتيح =====
document.addEventListener('keydown', (e) => {
    if (!originalImage) return;
    if (e.key === 'Escape') closeAllPanels();
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); /* could add undo */ }
});
    </script>
